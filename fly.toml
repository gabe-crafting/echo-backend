# Fly.io config. App names are globally unique — change `app` if "echo-backend"
# is taken, or let `fly launch` pick one and overwrite this file.
app = "echo-backend"
# Frankfurt — closest to the app's Europe/Bucharest data. Change if you prefer.
primary_region = "fra"

[build]

[env]
  # SQLite path on the mounted volume (see [mounts]); keeps data across redeploys.
  DB_PATH = "/data/weather.db"
  PORT = "3000"

# Persistent volume for the SQLite file. Create it once before first deploy:
#   fly volumes create echo_data --region fra --size 1
[mounts]
  source = "echo_data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  # Scale to zero when idle to keep costs near nothing; cold-starts on next request.
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  # Basic liveness check against the root route.
  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
