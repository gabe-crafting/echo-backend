# fly.toml app configuration file generated for echo-backend-cjei6a on 2026-06-11T16:37:57Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'echo-backend-cjei6a'
primary_region = 'fra'

[build]

[env]
  DB_PATH = '/data/weather.db'
  PORT = '3000'

[[mounts]]
  source = 'echo_data'
  destination = '/data'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
